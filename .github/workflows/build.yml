name: Build KhamChat AAB
on: push
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install @capacitor/core @capacitor/cli @capacitor/android
      - run: mkdir www
      - run: echo "<html><body><script>window.location='https://khamchat-ve3f.vercel.app'</script></body></html>" > www/index.html
      - run: npx cap init "KhamChat" "com.khamchat.app" --web-dir=www --skip
      - run: npx cap add android
      - run: npx cap sync
      - run: cd android && ./gradlew bundleRelease
      - uses: actions/upload-artifact@v4
        with:
          name: KhamChat-AAB
          path: android/app/build/outputs/bundle/release/app-release.aab
